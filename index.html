  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .animate-fade-up { animation: fadeInUp 0.5s ease forwards; }
  .animate-slide-in { animation: slideIn 0.4s ease forwards; }
  .animate-scale-in { animation: scaleIn 0.3s ease forwards; }
  .stagger-1 { animation-delay: 0.05s; }
  .stagger-2 { animation-delay: 0.1s; }
  .stagger-3 { animation-delay: 0.15s; }
  .stagger-4 { animation-delay: 0.2s; }
  .stagger-5 { animation-delay: 0.25s; }
  .stagger-6 { animation-delay: 0.3s; }

  .subject-card:hover { border-color: var(--primary-container); box-shadow: 0 4px 20px rgba(0,32,69,0.1); transform: translateY(-2px); }

  .option-btn { transition: all 0.15s ease; border: 1.5px solid var(--outline-variant); }
  .option-btn:hover:not(.selected):not(.correct):not(.incorrect) { border-color: var(--primary); background: var(--surface-low); }
  .option-btn.selected { border: 2px solid var(--primary); background: #e8f0fd; }
  .option-btn.correct { border: 2px solid var(--success); background: var(--success-container); }
  .option-btn.incorrect { border: 2px solid var(--error); background: var(--error-container); }

  .difficulty-btn { transition: all 0.2s ease; cursor: pointer; }
  .difficulty-btn:hover { transform: scale(1.03); }
  .difficulty-btn.active { transform: scale(1.03); box-shadow: 0 0 0 3px rgba(0,32,69,0.2); }

  .nav-item { transition: all 0.15s ease; }
  .progress-bar-inner { transition: width 0.4s ease; }
  .timer-urgent { color: var(--error) !important; animation: pulse 1s infinite; }

  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }

  .badge-easy { background: #d2f4e3; color: #1a6640; border: 1px solid #b2e4cc; }
  .badge-medium { background: #fff3cd; color: #7a5500; border: 1px solid #ffe08a; }
  .badge-hard { background: #ffdad6; color: #93000a; border: 1px solid #ffb3ad; }

  .result-correct { background: var(--success-container); border-left: 4px solid var(--success); }
  .result-incorrect { background: var(--error-container); border-left: 4px solid var(--error); }
</style>

const DifficultyBadge = ({ level }) => {
  const styles = {
    easy: "badge-easy",
    medium: "badge-medium",
    hard: "badge-hard"
  };
  const labels = { easy: "Easy", medium: "Medium", hard: "Hard" };

const ProgressRing = ({ percent, size = 60, stroke = 5, color = "#1a365d" }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5eeff" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        className="progress-ring"/>
      <text x={size/2} y={size/2} textAnchor="middle" dy="0.35em"
        style={{fontSize: size*0.22, fontFamily: 'Lexend', fontWeight: 600, fill: color}}>
        {Math.round(percent)}%
      </text>
    </svg>
  );
};

      });
    }, 1000);
    totalTimeRef.current = setInterval(() => setTotalTime(t => t + 1), 1000);
    return () => { clearInterval(timerRef.current); clearInterval(totalTimeRef.current); };
  }, [currentIdx]);

  const resetTimer = () => {
    clearInterval(timerRef.current);
    const nextQ = allQuestions[currentIdx + 1];
    if (!nextQ) return;
    const nextDiff = getDiffLabel(nextQ.id);
    setTimeLeft(nextDiff === 'hard' ? 90 : nextDiff === 'medium' ? 60 : 45);
  };

  const handleSelect = (idx) => {
    if (confirmed) return;
    setSelected(idx);
  };

  const handleConfirm = (autoSkip = false) => {
    clearInterval(timerRef.current);
    const ans = autoSkip ? selected : selected;
    setAnswers(prev => ({ ...prev, [q.id]: ans }));
    setConfirmed(true);
  };

  const handleNext = () => {
    if (currentIdx + 1 >= allQuestions.length) {
      clearInterval(totalTimeRef.current);
      onComplete({ answers, questions: allQuestions, totalTime });
    } else {
      setCurrentIdx(i => i + 1);
      setSelected(null);
      setConfirmed(false);
      resetTimer();
    }
  };

  const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

  const isUrgent = timeLeft <= 10;

  return (
    <div className="min-h-screen flex flex-col" style={{background: 'var(--bg)'}}>
      {/* Top Bar */}
      <div className="sticky top-0 z-30 bg-white border-b" style={{borderColor: 'var(--outline-variant)'}}>
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <button onClick={() => onNavigate('home')} className="w-7 h-7 rounded flex items-center justify-center hover:bg-gray-100">
                <Icon name="close" style={{color: 'var(--on-surface-variant)', fontSize: '18px'}}/>
              </button>
              <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>{subject.name}</span>
              {difficulty !== 'all' && <DifficultyBadge level={difficulty}/>}
            </div>
            <div className="flex items-center gap-3">
              <span className="text-xs font-lexend" style={{color: 'var(--on-surface-variant)'}}>
                {currentIdx+1}/{allQuestions.length}
              </span>
              <div className={`flex items-center gap-1 px-2.5 py-1 rounded-full font-lexend font-semibold text-sm ${isUrgent ? 'timer-urgent' : ''}`}
                style={{background: isUrgent ? 'var(--error-container)' : 'var(--surface-container)', color: isUrgent ? 'var(--error)' : 'var(--primary)'}}>
                <Icon name="timer" style={{fontSize: '15px'}}/>
                {fmt(timeLeft)}
              </div>
            </div>
          </div>
          <div className="h-1.5 rounded-full" style={{background: 'var(--surface-container)'}}>
            <div className="h-full rounded-full progress-bar-inner" style={{width: progress+'%', background: subject.color}}/>
          </div>
        </div>
      </div>

      {/* Question */}
      <div className="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
        <div className="animate-scale-in">
          {difficulty === 'all' && (
            <div className="mb-3">
              <DifficultyBadge level={getDiffLabel(q.id)}/>
            </div>
          )}
          <div className="bg-white rounded-xl p-6 mb-5 border" style={{borderColor: 'var(--outline-variant)'}}>
            <p className="text-xs font-lexend font-semibold tracking-widest uppercase mb-3" style={{color: 'var(--on-surface-variant)'}}>
              Question {currentIdx + 1}
            </p>
            <p className="text-base font-medium leading-relaxed whitespace-pre-wrap" style={{color: 'var(--on-surface)', fontFamily: 'Public Sans'}}>
              {q.question}
            </p>
          </div>

          {/* Options */}
          <div className="space-y-3 mb-6">
            {q.options.map((opt, i) => {
              let cls = 'option-btn';
              if (confirmed) {
                if (i === q.answer) cls += ' correct';
                else if (i === selected && i !== q.answer) cls += ' incorrect';
              } else if (selected === i) cls += ' selected';

              return (
                <button key={i} onClick={() => handleSelect(i)}
                  className={`${cls} w-full text-left p-4 rounded-xl flex items-center gap-3 transition-all`}
                  style={{background: confirmed && i === q.answer ? undefined : undefined}}>
                  <span className="w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center font-lexend font-semibold text-xs"
                    style={{background: 'var(--surface-container)', color: 'var(--on-surface-variant)'}}>
                    {String.fromCharCode(65+i)}
                  </span>
                  <span className="text-sm" style={{color: 'var(--on-surface)', fontFamily: 'Public Sans'}}>{opt}</span>
                  {confirmed && i === q.answer && <Icon name="check_circle" className="filled ml-auto" style={{color: 'var(--success)', fontSize: '20px'}}/>}
                  {confirmed && i === selected && i !== q.answer && <Icon name="cancel" className="filled ml-auto" style={{color: 'var(--error)', fontSize: '20px'}}/>}
                </button>
              );
            })}
          </div>

          {/* Explanation */}
          {confirmed && (
            <div className="p-4 rounded-xl mb-5 animate-fade-up" style={{background: 'var(--surface-low)', border: '1px solid var(--outline-variant)'}}>
              <div className="flex items-center gap-2 mb-2">
                <Icon name="lightbulb" className="filled" style={{color: '#7a5500', fontSize: '18px'}}/>
                <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>Explanation</span>
              </div>
              <p className="text-sm leading-relaxed" style={{color: 'var(--on-surface-variant)'}}>{q.explanation}</p>
            </div>
          )}

          {/* Action Buttons */}
          <div className="flex gap-3">
            {!confirmed ? (
              <button onClick={() => handleConfirm(false)}
                disabled={selected === null}
                className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm transition-all active:scale-98"
                style={{
                  background: selected !== null ? 'var(--primary)' : 'var(--outline-variant)',
                  color: selected !== null ? 'white' : 'var(--on-surface-variant)',
                  cursor: selected !== null ? 'pointer' : 'not-allowed'
                }}>
                Confirm Answer
              </button>
            ) : (
              <button onClick={handleNext}
                className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm transition-all hover:opacity-90 active:scale-98 flex items-center justify-center gap-2"
                style={{background: 'var(--primary)', color: 'white', cursor: 'pointer'}}>
                {currentIdx + 1 >= allQuestions.length ? (
                  <><Icon name="assessment" className="text-base"/>View Results</>
                ) : (
                  <><span>Next Question</span><Icon name="arrow_forward" className="text-base"/></>
                )}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// ==================== RESULTS PAGE ====================
const ResultsPage = ({ subjectId, difficulty, quizData, onNavigate, onRetry }) => {
  const { answers, questions, totalTime } = quizData;
  const subject = SUBJECTS.find(s => s.id === subjectId);

  const correct = questions.filter(q => answers[q.id] === q.answer).length;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  const fmt = (s) => s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`;

  const grade = pct >= 80 ? {label: 'Excellent', color: '#1a6640', bg: '#d2f4e3', icon: 'military_tech'}
    : pct >= 60 ? {label: 'Good', color: '#7a5500', bg: '#fff3cd', icon: 'thumb_up'}
    : pct >= 40 ? {label: 'Fair', color: '#455f88', bg: 'var(--surface-container)', icon: 'trending_up'}
    : {label: 'Needs Work', color: '#93000a', bg: '#ffdad6', icon: 'replay'};

  const getDiffLabel = (id) => {
    if (!subjectId) return 'easy';
    if (QUESTIONS_DB[subjectId].easy.find(q=>q.id===id)) return 'easy';
    if (QUESTIONS_DB[subjectId].medium.find(q=>q.id===id)) return 'medium';
    return 'hard';
  };

  return (
    <div className="min-h-screen" style={{background: 'var(--bg)'}}>
      <div className="sticky top-0 z-30 bg-white border-b" style={{borderColor: 'var(--outline-variant)'}}>
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background: subject.color}}>
              <Icon name={subject.icon} className="text-white" style={{fontSize: '15px'}}/>
            </div>
            <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>Results</span>
          </div>
          <button onClick={() => onNavigate('home')}
            className="px-3 py-1.5 rounded-lg text-xs font-lexend font-semibold"
            style={{background: 'var(--surface-container)', color: 'var(--primary)'}}>
            Home
          </button>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 py-8">
        {/* Score Card */}
        <div className="bg-white rounded-2xl p-6 mb-6 border text-center animate-scale-in" style={{borderColor: 'var(--outline-variant)'}}>
          <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full mb-4"
            style={{background: grade.bg, color: grade.color}}>
            <Icon name={grade.icon} className="filled text-base"/>
            <span className="font-lexend font-semibold text-sm">{grade.label}</span>
          </div>
          <div className="flex justify-center mb-4">
            <ProgressRing percent={pct} size={100} stroke={8} color={subject.color}/>
          </div>
          <p className="font-lexend font-bold text-3xl mb-1" style={{color: 'var(--primary)'}}>{correct}/{total}</p>
          <p className="text-sm" style={{color: 'var(--on-surface-variant)'}}>questions answered correctly</p>
          <div className="grid grid-cols-3 gap-3 mt-5 pt-5 border-t" style={{borderColor: 'var(--outline-variant)'}}>
            {[
              {label: 'Correct', val: correct, color: '#1a6640'},
              {label: 'Incorrect', val: total - correct - (Object.keys(answers).length - Object.keys(answers).filter(k => answers[k] !== null && answers[k] !== undefined).length), color: '#93000a'},
              {label: 'Time', val: fmt(totalTime), color: 'var(--primary)'}
            ].map(s => (
              <div key={s.label} className="text-center">
                <p className="font-lexend font-bold text-xl" style={{color: s.color}}>{s.val}</p>
                <p className="text-xs" style={{color: 'var(--on-surface-variant)'}}>{s.label}</p>
              </div>
            ))}
          </div>
        </div>

        {/* Action Buttons */}
        <div className="flex gap-3 mb-6">
          <button onClick={onRetry}
            className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm border-2 transition-all hover:bg-gray-50 flex items-center justify-center gap-2"
            style={{borderColor: 'var(--primary)', color: 'var(--primary)'}}>
            <Icon name="replay" className="text-base"/>Retry
          </button>
          <button onClick={() => onNavigate('subject-detail', {subjectId})}
            className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm transition-all hover:opacity-90 flex items-center justify-center gap-2"
            style={{background: 'var(--primary)', color: 'white'}}>
            <Icon name="change_circle" className="text-base"/>Change Level
          </button>
        </div>

        {/* Answer Review */}
        <h2 className="font-lexend font-semibold text-lg mb-4" style={{color: 'var(--primary)'}}>Answer Review</h2>
        <div className="space-y-4">
          {questions.map((q, idx) => {
            const userAns = answers[q.id];
            const isCorrect = userAns === q.answer;
            const skipped = userAns === null || userAns === undefined;
            return (
              <div key={q.id} className={`rounded-xl p-4 border animate-fade-up`}
                style={{
                  background: skipped ? 'var(--surface-low)' : isCorrect ? 'var(--success-container)' : 'var(--error-container)',
                  borderLeft: `4px solid ${skipped ? 'var(--outline)' : isCorrect ? 'var(--success)' : 'var(--error)'}`,
                  borderTop: '1px solid transparent', borderRight: '1px solid transparent', borderBottom: '1px solid transparent'
                }}>
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-lexend font-bold text-sm" style={{color: 'var(--primary)'}}>Q{idx+1}</span>
                    <DifficultyBadge level={getDiffLabel(q.id)}/>
                  </div>
                  <Icon name={skipped ? 'remove_circle' : isCorrect ? 'check_circle' : 'cancel'}
                    className="filled flex-shrink-0"
                    style={{color: skipped ? 'var(--outline)' : isCorrect ? 'var(--success)' : 'var(--error)', fontSize: '20px'}}/>
                </div>
                <p className="text-sm mb-3 font-medium" style={{color: 'var(--on-surface)'}}>{q.question}</p>
                <div className="space-y-1.5">
                  {!skipped && userAns !== q.answer && (
                    <p className="text-xs" style={{color: 'var(--error)'}}>
                      <span className="font-semibold">Your answer:</span> {q.options[userAns]}
                    </p>
                  )}
                  <p className="text-xs" style={{color: 'var(--success)'}}>
                    <span className="font-semibold">Correct:</span> {q.options[q.answer]}
                  </p>
                  <p className="text-xs mt-2 leading-relaxed" style={{color: 'var(--on-surface-variant)'}}>
                    💡 {q.explanation}
                  </p>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ==================== MOCK TEST ====================
const MockTest = ({ onComplete, onNavigate }) => {
  const [phase, setPhase] = useState('setup'); // setup | quiz
  const [mockDifficulty, setMockDifficulty] = useState('medium');
  const [mockQuestions, setMockQuestions] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [selected, setSelected] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [timeLeft, setTimeLeft] = useState(3600);
  const [showResult, setShowResult] = useState(false);
  const timerRef = useRef(null);

  const generateMockQuestions = (diff) => {
    const questions = [];
    SUBJECTS.forEach(subj => {
      const pool = QUESTIONS_DB[subj.id][diff] || QUESTIONS_DB[subj.id].medium;
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      questions.push(...shuffled.slice(0, Math.min(3, shuffled.length)).map(q => ({...q, subjectId: subj.id, subjectName: subj.name, subjectIcon: subj.icon})));
    });
    return questions.sort(() => Math.random() - 0.5);
  };

  const startMock = () => {
    const qs = generateMockQuestions(mockDifficulty);
    setMockQuestions(qs);
    setPhase('quiz');
    const t = mockDifficulty === 'easy' ? 1800 : mockDifficulty === 'medium' ? 3000 : 3600;
    setTimeLeft(t);
  };

  useEffect(() => {
    if (phase === 'quiz') {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); setShowResult(true); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [phase]);

  const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

  const handleNext = () => {
    const newAnswers = { ...answers, [mockQuestions[currentIdx].id]: selected };
    setAnswers(newAnswers);
    if (currentIdx + 1 >= mockQuestions.length) {
      clearInterval(timerRef.current);
      setAnswers(newAnswers);
      setShowResult(true);
    } else {
      setCurrentIdx(i => i + 1);
      setSelected(null);
      setConfirmed(false);
    }
  };

  if (showResult) {
    const correct = mockQuestions.filter(q => answers[q.id] === q.answer).length;
    const pct = Math.round((correct / mockQuestions.length) * 100);
    const bySubject = {};
    SUBJECTS.forEach(s => {
      const subjQs = mockQuestions.filter(q => q.subjectId === s.id);
      const subjCorrect = subjQs.filter(q => answers[q.id] === q.answer).length;
      bySubject[s.id] = { name: s.name, icon: s.icon, color: s.color, total: subjQs.length, correct: subjCorrect };
    });

    return (
      <div className="min-h-screen" style={{background: 'var(--bg)'}}>
        <div className="sticky top-0 z-30 bg-white border-b" style={{borderColor: 'var(--outline-variant)'}}>
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>Mock Test Results</span>
            <button onClick={() => onNavigate('home')} className="px-3 py-1.5 rounded-lg text-xs font-lexend font-semibold" style={{background: 'var(--surface-container)', color: 'var(--primary)'}}>Home</button>
          </div>
        </div>
        <div className="max-w-3xl mx-auto px-4 py-8">
          <div className="bg-white rounded-2xl p-6 border mb-6 text-center" style={{borderColor: 'var(--outline-variant)'}}>
            <div className="flex justify-center mb-3"><ProgressRing percent={pct} size={90} stroke={7} color="#002045"/></div>
            <p className="font-lexend font-bold text-2xl" style={{color: 'var(--primary)'}}>{correct}/{mockQuestions.length} Correct</p>
            <p className="text-sm mt-1" style={{color: 'var(--on-surface-variant)'}}>
              {pct >= 70 ? '🎉 Great performance!' : pct >= 50 ? '👍 Good effort, keep practicing!' : '📚 More practice needed'}
            </p>
          </div>
          <h3 className="font-lexend font-semibold text-base mb-3" style={{color: 'var(--primary)'}}>Subject-wise Breakdown</h3>
          <div className="space-y-3 mb-6">
            {Object.values(bySubject).filter(s => s.total > 0).map(s => (
              <div key={s.name} className="bg-white rounded-xl p-4 border" style={{borderColor: 'var(--outline-variant)'}}>
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <div className="w-6 h-6 rounded flex items-center justify-center" style={{background: s.color}}>
                      <Icon name={s.icon} className="text-white" style={{fontSize: '13px'}}/>
                    </div>
                    <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>{s.name}</span>
                  </div>
                  <span className="font-lexend font-bold text-sm" style={{color: s.correct/s.total >= 0.7 ? 'var(--success)' : 'var(--error)'}}>
                    {s.correct}/{s.total}
                  </span>
                </div>
                <div className="h-1.5 rounded-full" style={{background: 'var(--surface-container)'}}>
                  <div className="h-full rounded-full progress-bar-inner" style={{width: Math.round(s.correct/s.total*100)+'%', background: s.color}}/>
                </div>
              </div>
            ))}
          </div>
          <div className="flex gap-3">
            <button onClick={() => { setPhase('setup'); setShowResult(false); setAnswers({}); setCurrentIdx(0); setSelected(null); setConfirmed(false); }}
              className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm border-2 transition-all hover:bg-gray-50"
              style={{borderColor: 'var(--primary)', color: 'var(--primary)'}}>
              Retake Mock
            </button>
            <button onClick={() => onNavigate('home')}
              className="flex-1 py-3 rounded-xl font-lexend font-semibold text-sm"
              style={{background: 'var(--primary)', color: 'white'}}>
              Back to Home
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (phase === 'setup') {
    const diffOptions = [
      {id: 'easy', label: 'Easy', desc: 'Build foundation, ~30 min', icon: 'sentiment_satisfied', color: '#1a6640', bg: '#d2f4e3'},
      {id: 'medium', label: 'Medium', desc: 'Balanced challenge, ~50 min', icon: 'sentiment_neutral', color: '#7a5500', bg: '#fff3cd'},
      {id: 'hard', label: 'Hard', desc: 'Full pressure, ~60 min', icon: 'sentiment_very_dissatisfied', color: '#93000a', bg: '#ffdad6'},
    ];
    return (
      <div className="min-h-screen" style={{background: 'var(--bg)'}}>
        <div className="sticky top-0 z-30 bg-white border-b" style={{borderColor: 'var(--outline-variant)'}}>
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
            <button onClick={() => onNavigate('home')} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100">
              <Icon name="arrow_back" style={{color: 'var(--primary)'}}/>
            </button>
            <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>Mock Test Setup</span>
          </div>
        </div>
        <div className="max-w-3xl mx-auto px-4 py-8">
          <div className="mb-8 p-5 rounded-xl" style={{background: 'var(--primary)'}}>
            <div className="flex items-center gap-3 mb-2">
              <Icon name="quiz" className="text-2xl" style={{color: '#adc7f7'}}/>
              <h2 className="font-lexend font-bold text-xl text-white">Full Mock Test</h2>
            </div>
            <p style={{color: '#86a0cd', fontSize: '14px'}}>~18 questions across all 6 subjects, simulating real placement test conditions.</p>
          </div>
          <h3 className="font-lexend font-semibold text-base mb-4" style={{color: 'var(--primary)'}}>Select Difficulty</h3>
          <div className="grid grid-cols-1 gap-3 mb-8">
            {diffOptions.map(d => (
              <div key={d.id} onClick={() => setMockDifficulty(d.id)}
                className={`p-4 rounded-xl border-2 cursor-pointer difficulty-btn flex items-center gap-4`}
                style={{
                  background: mockDifficulty === d.id ? d.bg : 'white',
                  borderColor: mockDifficulty === d.id ? d.color : 'var(--outline-variant)',
                }}>
                <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background: d.bg}}>
                  <Icon name={d.icon} style={{color: d.color, fontSize: '22px'}}/>
                </div>
                <div className="flex-1">
                  <p className="font-lexend font-semibold text-sm" style={{color: d.color}}>{d.label}</p>
                  <p className="text-xs" style={{color: 'var(--on-surface-variant)'}}>{d.desc}</p>
                </div>
                {mockDifficulty === d.id && <Icon name="check_circle" className="filled" style={{color: d.color}}/>}
              </div>
            ))}
          </div>
          <button onClick={startMock}
            className="w-full py-3.5 rounded-xl font-lexend font-semibold text-base transition-all hover:opacity-90 active:scale-98 flex items-center justify-center gap-2"
            style={{background: 'var(--primary)', color: 'white', cursor: 'pointer'}}>
            <Icon name="play_arrow" className="text-lg"/>
            Start Mock Test
          </button>
        </div>
      </div>
    );
  }

  // Quiz phase
  const q = mockQuestions[currentIdx];
  const progress = (currentIdx / mockQuestions.length) * 100;
  const isUrgent = timeLeft <= 120;
  const subj = SUBJECTS.find(s => s.id === q.subjectId);

  return (
    <div className="min-h-screen flex flex-col" style={{background: 'var(--bg)'}}>
      <div className="sticky top-0 z-30 bg-white border-b" style={{borderColor: 'var(--outline-variant)'}}>
        <div className="max-w-3xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between mb-2">
            <span className="font-lexend font-semibold text-sm" style={{color: 'var(--primary)'}}>Mock Test</span>
            <div className="flex items-center gap-3">
              <span className="text-xs font-lexend" style={{color: 'var(--on-surface-variant)'}}>{currentIdx+1}/{mockQuestions.length}</span>
              <div className={`flex items-center gap-1 px-2.5 py-1 rounded-full font-lexend font-semibold text-sm ${isUrgent ? 'timer-urgent' : ''}`}
                style={{background: isUrgent ? 'var(--error-container)' : 'var(--surface-container)', color: isUrgent ? 'var(--error)' : 'var(--primary)'}}>
                <Icon name="timer" style={{fontSize: '15px'}}/>
                {fmt(timeLeft)}
              </div>
            </div>
          </div>
          <div className="h-1.5 rounded-full" style={{background: 'var(--surface-container)'}}>
            <div className="h-full rounded-full progress-bar-inner" style={{width: progress+'%', background: 'var(--primary)'}}/>
          </div>
        </div>
      </div>

      <div className="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
        <div className="animate-scale-in">
          <div className="flex items-center gap-2 mb-3">
            <div className="w-6 h-6 rounded flex items-center justify-center" style={{background: subj.color}}>
              <Icon name={subj.icon} className="text-white" style={{fontSize: '13px'}}/>
            </div>
            <span className="text-xs font-semibold font-lexend" style={{color: 'var(--on-surface-variant)'}}>{subj.name}</span>
            <DifficultyBadge level={mockDifficulty}/>
          </div>
          <div className="bg-white rounded-xl p-5 mb-4 border" style={{borderColor: 'var(--outline-variant)'}}>
            <p className="text-base font-medium leading-relaxed" style={{color: 'var(--on-surface)'}}>{q.question}</p>
          </div>
          <div className="space-y-2.5 mb-6">
            {q.options.map((opt, i) => {
              let cls = 'option-btn';
              if (confirmed) {
                if (i === q.answer) cls += ' correct';
                else if (i === selected && i !== q.answer) cls += ' incorrect';
              } else if (selected === i) cls += ' selected';
              return (
                <button key={i} onClick={() => !confirmed && setSelected(i)}
                  className={`${cls} w-full text-left p-3.5 rounded-xl flex items-center gap-3`}>
                  <span className="w-6 h-6 rounded flex-shrink-0 flex items-center justify-center font-lexend font-semibold text-xs"
                    style={{background: 'var(--surface-container)', color: 'var(--on-surface-variant)'}}>
                    {String.fromCharCode(65+i)}
                  </span>
                  <span className="text-sm">{opt}</span>
                  {confirmed && i === q.answer && <Icon name="check_circle" className="filled ml-auto" style={{color: 'var(--success)', fontSize: '18px'}}/>}
                  {confirmed && i === selected && i !== q.answer && <Icon name="cancel" className="filled ml-auto" style={{color: 'var(--error)', fontSize: '18px'}}/>}
                </button>
              );
            })}
          </div>
          {confirmed && (
            <div className="p-4 rounded-xl mb-4 animate-fade-up" style={{background: 'var(--surface-low)', border: '1px solid var(--outline-variant)'}}>
              <p className="text-xs font-semibold mb-1" style={{color: 'var(--primary)'}}>💡 {q.explanation}</p>
            </div>
          )}
          {!confirmed ? (
            <button onClick={() => { setConfirmed(true); setAnswers(prev => ({...prev, [q.id]: selected})); }}
              disabled={selected === null}
              className="w-full py-3 rounded-xl font-lexend font-semibold text-sm transition-all"
              style={{background: selected !== null ? 'var(--primary)' : 'var(--outline-variant)', color: selected !== null ? 'white' : 'var(--on-surface-variant)', cursor: selected !== null ? 'pointer' : 'not-allowed'}}>
              Confirm
            </button>
          ) : (
            <button onClick={handleNext}
              className="w-full py-3 rounded-xl font-lexend font-semibold text-sm flex items-center justify-center gap-2 hover:opacity-90"
              style={{background: 'var(--primary)', color: 'white', cursor: 'pointer'}}>
              {currentIdx + 1 >= mockQuestions.length ? 'See Results' : 'Next Question'}
              <Icon name="arrow_forward" className="text-base"/>
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

// ==================== MAIN APP ====================
const App = () => {
  const [page, setPage] = useState('home');
  const [pageParams, setPageParams] = useState({});
  const [quizData, setQuizData] = useState(null);
  const [stats, setStats] = useState({});

  const navigate = (to, params = {}) => {
    setPage(to);
    setPageParams(params);
    window.scrollTo(0, 0);
  };

  const startQuiz = (subjectId, difficulty) => {
    setPageParams({ subjectId, difficulty });
    setPage('quiz');
    window.scrollTo(0, 0);
  };

  const handleQuizComplete = (data) => {
    const { subjectId, difficulty } = pageParams;
    setQuizData(data);
    // Update stats
    if (difficulty !== 'all') {
      const correct = data.questions.filter(q => data.answers[q.id] === q.answer).length;
      setStats(prev => ({
        ...prev,
        [subjectId]: {
          ...(prev[subjectId] || {}),
          [difficulty]: Math.max(correct, (prev[subjectId] || {})[difficulty] || 0)
        }
      }));
    }
    setPage('results');
    window.scrollTo(0, 0);
  };

  const retryQuiz = () => {
    setPage('quiz');
    setQuizData(null);
    window.scrollTo(0, 0);
  };

  return (
    <div>
      {/* Top Navigation for non-quiz pages */}
      {!['quiz', 'mock', 'results'].includes(page) && (
        <nav className="bg-white border-b sticky top-0 z-40" style={{borderColor: 'var(--outline-variant)'}}>
          <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('home')}>
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background: 'var(--primary)'}}>
                <Icon name="school" className="text-white text-base"/>
              </div>
              <span className="font-lexend font-bold text-base" style={{color: 'var(--primary)'}}>PlacementPrep</span>
            </div>
            <div className="flex items-center gap-1">
              {[
                {id: 'home', label: 'Home', icon: 'home'},
                {id: 'subjects', label: 'Subjects', icon: 'menu_book'},
                {id: 'mock', label: 'Mock Test', icon: 'quiz'},
              ].map(n => (
                <button key={n.id} onClick={() => navigate(n.id)}
                  className="hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-lexend font-semibold nav-item transition-all"
                  style={{
                    background: page === n.id ? 'var(--surface-container)' : 'transparent',
                    color: page === n.id ? 'var(--primary)' : 'var(--on-surface-variant)'
                  }}>
                  <Icon name={n.icon} style={{fontSize: '16px'}}/>
                  {n.label}
                </button>
              ))}
              {/* Mobile nav */}
              <div className="flex sm:hidden items-center gap-1">
                {[{id:'home',icon:'home'},{id:'subjects',icon:'menu_book'},{id:'mock',icon:'quiz'}].map(n => (
                  <button key={n.id} onClick={() => navigate(n.id)}
                    className="w-9 h-9 rounded-lg flex items-center justify-center"
                    style={{background: page === n.id ? 'var(--surface-container)' : 'transparent', color: page === n.id ? 'var(--primary)' : 'var(--on-surface-variant)'}}>
                    <Icon name={n.icon} style={{fontSize: '20px'}}/>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </nav>
      )}

      {/* Pages */}
      {page === 'home' && <LandingPage onNavigate={navigate} stats={stats}/>}
      
      {page === 'subjects' && (
        <div className="min-h-screen" style={{background: 'var(--bg)'}}>
          <div className="max-w-6xl mx-auto px-4 py-8">
            <h1 className="font-lexend font-bold text-2xl mb-2" style={{color: 'var(--primary)'}}>All Subjects</h1>
            <p className="text-sm mb-6" style={{color: 'var(--on-surface-variant)'}}>Select a subject to choose your difficulty and start practicing</p>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {SUBJECTS.map((subj, i) => {
                const subjStats = stats[subj.id] || {};
                const totalDone = (subjStats.easy || 0) + (subjStats.medium || 0) + (subjStats.hard || 0);
                const pct = Math.round((totalDone / 15) * 100);
                return (
                  <div key={subj.id}
                    className={`subject-card bg-white rounded-xl p-5 cursor-pointer animate-fade-up stagger-${Math.min(i+1,6)}`}
                    onClick={() => navigate('subject-detail', {subjectId: subj.id})}>
                    <div className="flex items-start justify-between mb-3">
                      <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{background: subj.color}}>
                        <Icon name={subj.icon} className="text-white text-xl"/>
                      </div>
                      {totalDone > 0 && <ProgressRing percent={pct} size={44} stroke={4} color={subj.color}/>}
                    </div>
                    <h3 className="font-lexend font-semibold text-base mb-1" style={{color: 'var(--primary)'}}>{subj.name}</h3>
                    <p className="text-xs mb-3" style={{color: 'var(--on-surface-variant)'}}>{subj.description}</p>
                    <div className="flex gap-1.5 flex-wrap mb-3">
                      {['easy','medium','hard'].map(d => <DifficultyBadge key={d} level={d}/>)}
                    </div>
                    <div className="flex items-center gap-1 text-xs" style={{color: 'var(--primary)'}}>
                      <span className="font-semibold">Start →</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {page === 'subject-detail' && (
        <SubjectDetail
          subjectId={pageParams.subjectId}
          onNavigate={navigate}
          onStartQuiz={startQuiz}
        />
      )}

      {page === 'quiz' && (
        <QuizInterface
          key={`${pageParams.subjectId}-${pageParams.difficulty}-${Date.now()}`}
          subjectId={pageParams.subjectId}
          difficulty={pageParams.difficulty}
          onComplete={handleQuizComplete}
          onNavigate={navigate}
        />
      )}

      {page === 'results' && quizData && (
        <ResultsPage
          subjectId={pageParams.subjectId}
          difficulty={pageParams.difficulty}
          quizData={quizData}
          onNavigate={navigate}
          onRetry={retryQuiz}
        />
      )}

      {page === 'mock' && (
        <MockTest onComplete={() => {}} onNavigate={navigate}/>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
